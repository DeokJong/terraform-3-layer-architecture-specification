title: 3-Layer Terraform Documentation
description: Architecture specification, conventions, and ADRs for a 3-layer Terraform model
theme: minima
markdown: kramdown
kramdown:
  input: GFM
plugins:
  - jekyll-seo-tag
defaults:
  - scope:
      path: ""
    values:
      layout: default
      toc: true
header_pages:
  - index.md
  - architecture/index.md
  - conventions/index.md
  - adr/index.md
