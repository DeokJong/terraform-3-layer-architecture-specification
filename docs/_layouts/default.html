<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <style>
      :root {
        --bg: #f7f7f5;
        --surface: #ffffff;
        --surface-alt: #f1efe8;
        --text: #1f2328;
        --muted: #5a6472;
        --border: #d8d2c4;
        --link: #0b57d0;
        --heading: #111111;
        --code-bg: #f3f4f6;
        --shadow: 0 10px 30px rgba(17, 17, 17, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Noto Sans KR", sans-serif;
        line-height: 1.7;
        color: var(--text);
        background: linear-gradient(180deg, #f7f7f5 0%, #f3f0e8 100%);
      }

      a {
        color: var(--link);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .shell {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
        padding: 18px 20px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(10px);
        box-shadow: var(--shadow);
      }

      .brand {
        font-weight: 700;
        color: var(--heading);
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        font-size: 0.95rem;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 260px;
        gap: 24px;
        align-items: start;
      }

      .content {
        min-width: 0;
        padding: 32px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .sidebar {
        position: sticky;
        top: 24px;
        padding: 20px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(10px);
        box-shadow: var(--shadow);
      }

      .sidebar[hidden] {
        display: none;
      }

      .sidebar-title {
        margin: 0 0 12px;
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .sidebar-list {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .sidebar-item + .sidebar-item {
        margin-top: 6px;
      }

      .sidebar-link {
        display: block;
        padding: 8px 10px;
        border-radius: 12px;
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.45;
        transition: background-color 120ms ease, color 120ms ease;
      }

      .sidebar-link:hover {
        text-decoration: none;
        background: #f2ede2;
        color: var(--heading);
      }

      .sidebar-link.active {
        background: #ece4d1;
        color: var(--heading);
        font-weight: 600;
      }

      .sidebar-link.level-3 {
        padding-left: 22px;
        font-size: 0.9rem;
      }

      h1, h2, h3, h4 {
        color: var(--heading);
        line-height: 1.25;
      }

      h1 {
        margin-top: 0;
        font-size: 2.2rem;
      }

      h2 {
        margin-top: 2.2rem;
        padding-top: 0.4rem;
        border-top: 1px solid #ece6d8;
      }

      p, li, table {
        font-size: 1rem;
      }

      code {
        padding: 0.15rem 0.35rem;
        border-radius: 6px;
        background: var(--code-bg);
        font-family: Consolas, "Courier New", monospace;
      }

      pre {
        overflow-x: auto;
        padding: 16px;
        border-radius: 14px;
        background: #171717;
        color: #f3f3f3;
      }

      pre code {
        padding: 0;
        background: transparent;
        color: inherit;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin: 1rem 0 1.5rem;
      }

      th, td {
        padding: 12px 14px;
        border: 1px solid var(--border);
        vertical-align: top;
      }

      th {
        background: var(--surface-alt);
        text-align: left;
      }

      blockquote {
        margin: 1rem 0;
        padding: 0.8rem 1rem;
        border-left: 4px solid #b8a67b;
        background: #fbf8f2;
        color: var(--muted);
      }

      .mermaid-wrap {
        margin: 1.25rem 0 1.75rem;
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: #fcfbf8;
        overflow-x: auto;
      }

      footer {
        margin-top: 18px;
        color: var(--muted);
        font-size: 0.9rem;
        text-align: center;
      }

      html {
        scroll-behavior: smooth;
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: minmax(0, 1fr);
        }

        .sidebar {
          position: static;
          order: -1;
        }
      }

      @media (max-width: 740px) {
        .shell {
          padding: 16px;
        }

        .topbar,
        .content,
        .sidebar {
          padding: 20px;
        }

        h1 {
          font-size: 1.8rem;
        }
      }
    </style>
    <script type="module">
      import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

      mermaid.initialize({
        startOnLoad: false,
        securityLevel: "loose"
      });

      window.addEventListener("DOMContentLoaded", async () => {
        const blocks = document.querySelectorAll("pre code.language-mermaid");
        const content = document.querySelector(".content");
        const sidebar = document.querySelector("[data-page-sidebar]");
        const sidebarList = document.querySelector("[data-page-sidebar-list]");

        for (const block of blocks) {
          const pre = block.parentElement;
          const wrapper = document.createElement("div");
          wrapper.className = "mermaid-wrap";

          const container = document.createElement("div");
          container.className = "mermaid";
          container.textContent = block.textContent;

          wrapper.appendChild(container);
          pre.replaceWith(wrapper);
        }

        await mermaid.run({
          querySelector: ".mermaid"
        });

        if (!content || !sidebar || !sidebarList) {
          return;
        }

        const slugify = (text) =>
          text
            .toLowerCase()
            .trim()
            .replace(/[^\w\s-가-힣]/g, "")
            .replace(/\s+/g, "-");

        const headings = [...content.querySelectorAll("h2, h3")];
        const usedIds = new Set();

        const uniqueId = (base) => {
          let candidate = base || "section";
          let suffix = 2;

          while (usedIds.has(candidate) || document.getElementById(candidate)) {
            candidate = `${base}-${suffix}`;
            suffix += 1;
          }

          usedIds.add(candidate);
          return candidate;
        };

        if (!headings.length) {
          sidebar.hidden = true;
          return;
        }

        const links = headings.map((heading) => {
          if (!heading.id) {
            heading.id = uniqueId(slugify(heading.textContent));
          } else {
            usedIds.add(heading.id);
          }

          const item = document.createElement("li");
          item.className = "sidebar-item";

          const link = document.createElement("a");
          link.className = `sidebar-link level-${heading.tagName.slice(1)}`;
          link.href = `#${heading.id}`;
          link.textContent = heading.textContent;

          item.appendChild(link);
          sidebarList.appendChild(item);
          return { heading, link };
        });

        const setActiveLink = () => {
          const offset = 140;
          let active = links[0];

          for (const entry of links) {
            if (entry.heading.getBoundingClientRect().top - offset <= 0) {
              active = entry;
            } else {
              break;
            }
          }

          for (const entry of links) {
            entry.link.classList.toggle("active", entry === active);
          }
        };

        setActiveLink();
        document.addEventListener("scroll", setActiveLink, { passive: true });
      });
    </script>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <a class="brand" href="{{ '/index.html' | relative_url }}">{{ site.title }}</a>
        <nav class="nav">
          <a href="{{ '/architecture/index.html' | relative_url }}">Architecture</a>
          <a href="{{ '/conventions/index.html' | relative_url }}">Conventions</a>
          <a href="{{ '/adr/index.html' | relative_url }}">ADR</a>
        </nav>
      </header>

      <main class="layout">
        <article class="content">
          {{ content }}
        </article>
        <aside class="sidebar" data-page-sidebar>
          <p class="sidebar-title">On This Page</p>
          <ul class="sidebar-list" data-page-sidebar-list></ul>
        </aside>
      </main>

      <footer>
        Published from <code>/docs</code> via GitHub Pages
      </footer>
    </div>
  </body>
</html>
